<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LN CONSULTORIA — Dashboard Premium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080c14;--panel:#0f1420;--panel2:#141925;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --text:#edf2f7;--muted:#8896a8;--muted2:#6b7a8d;
  --gold:#c5a572;--gold2:#e8c98a;--gold-bg:rgba(197,165,114,.12);
  --zanoni:#3b52c4;--raz:#2d9166;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#6366f1;--purple:#a855f7;
  --radius:16px;--shadow:0 20px 50px rgba(0,0,0,.5);--shadow-sm:0 4px 16px rgba(0,0,0,.3);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit}a{color:#93b4ff;text-decoration:none}a:hover{text-decoration:underline}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:60;height:62px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(8,12,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:.95rem;letter-spacing:-.01em}
.brand-badge{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:1.1rem;box-shadow:0 0 16px rgba(197,165,114,.28);overflow:hidden;flex-shrink:0}
.brand-badge img{width:100%;height:100%;object-fit:cover}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-hint{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:.74rem;color:var(--muted);cursor:pointer;transition:var(--tr)}
.topbar-hint:hover{color:var(--text);border-color:var(--line2)}
.topbar-hint kbd{background:rgba(255,255,255,.08);border:1px solid var(--line2);border-radius:4px;padding:1px 5px;font-size:.7rem}
.ic-btn{background:transparent;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:.8rem;color:var(--muted);cursor:pointer;transition:var(--tr)}
.ic-btn:hover{color:var(--text);border-color:var(--line2);background:rgba(255,255,255,.04)}
.ic-btn.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(197,165,114,.35)}
body.presentation-mode .edit-only{display:none!important}

/* NAV */
.nav{display:flex;gap:5px;flex-wrap:wrap}
.nav button{border:1px solid transparent;background:transparent;color:var(--muted);border-radius:8px;padding:7px 13px;font-size:.8rem;cursor:pointer;transition:var(--tr);white-space:nowrap}
.nav button:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav button.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(197,165,114,.2)}

/* LAYOUT */
.wrap{max-width:1440px;margin:0 auto;padding:26px 22px 60px}
.page{display:none;animation:fade .22s ease}.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* HERO */
.hero{text-align:center;padding:22px 0 6px}
.hero h1{font-size:2.7rem;font-weight:900;letter-spacing:-.04em;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:1rem}
.hero-meta{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px;font-size:.74rem;color:var(--muted2)}
.hero-meta span{display:flex;align-items:center;gap:5px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.84)}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin:22px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px 15px;text-align:center;transition:var(--tr)}
.stat:hover{border-color:var(--line2);transform:translateY(-2px)}
.stat .num{font-size:1.9rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat .lbl{margin-top:6px;color:var(--muted);font-size:.77rem;font-weight:500}
.stat .num.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* SECTION TITLE */
.section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:30px 0 13px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--line)}

/* PROGRESS */
.progress-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:0}
.progress-row{display:flex;gap:12px;align-items:center;margin:9px 0}
.progress-label{width:190px;flex-shrink:0;font-size:.86rem}
.progress-bar{flex:1;height:7px;border-radius:999px;background:rgba(255,255,255,.06)}
.progress-fill{height:100%;border-radius:inherit;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-pct{width:38px;text-align:right;color:var(--muted);font-size:.77rem;font-weight:600}

/* BRAND GRID */
.brand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin:18px 0}
.brand-card{border-radius:20px;padding:22px;border:1px solid var(--line);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.brand-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.brand-card.zanoni{background:linear-gradient(140deg,#0c1030,#1b2460,#1e2e8c)}
.brand-card.raz{background:linear-gradient(140deg,#0a1e14,#1a4a32,#1e6945)}
.brand-stat-row{display:flex;gap:14px;margin-top:13px}
.brand-stat{text-align:center;flex:1}
.brand-stat .bs-n{font-size:1.35rem;font-weight:800}
.brand-stat .bs-l{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:2px}
.brand-cta{margin-top:12px;color:rgba(255,255,255,.55);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em}

/* OVERVIEW CHARTS */
.overview-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
@media(max-width:860px){.overview-charts{grid-template-columns:1fr}}
.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.chart-card h4{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
.donut-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.donut-wrap{position:relative;width:105px;height:105px;flex-shrink:0}
.donut-wrap canvas{position:absolute;inset:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut-center .dc-n{font-size:1.25rem;font-weight:800}
.donut-center .dc-l{font-size:.63rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.81rem}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* PAGE HEAD */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h2{font-size:1.9rem;font-weight:800;letter-spacing:-.03em}
.page-head p{margin:.3rem 0 0;color:var(--muted);font-size:.92rem}
.toolbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.ghost-btn,.primary-btn,.danger-btn,.small-btn{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:7px 13px;font-size:.78rem;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:6px}
.ghost-btn:hover,.small-btn:hover{color:var(--text);border-color:var(--line2);background:rgba(255,255,255,.04)}
.primary-btn{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:600}
.primary-btn:hover{background:#1d50d8;border-color:#1d50d8}
.danger-btn{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.22)}
.danger-btn:hover{background:rgba(239,68,68,.18)}
.small-btn{padding:4px 9px;font-size:.74rem}

/* SUBNAV */
.subnav{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 16px}
.subnav button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:6px 12px;font-size:.79rem;cursor:pointer;transition:var(--tr)}
.subnav button:hover{color:var(--text);border-color:var(--line2)}
.subnav button.active{color:#fff;border-color:transparent}
.subnav button.active.z{background:var(--zanoni)}
.subnav button.active.r{background:var(--raz)}

/* FILTER */
.filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.filter input,.filter select{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:.81rem;outline:none}
.filter input:focus,.filter select:focus{border-color:var(--line2)}

/* BOARD */
.board-wrap{display:grid;grid-template-columns:repeat(8,minmax(210px,1fr));gap:11px;overflow-x:auto;padding-bottom:8px}
.cat-col{background:var(--panel);border:1px solid var(--line);border-radius:15px;min-width:210px}
.cat-head{padding:10px 13px;border-bottom:1px solid var(--line);font-weight:700;font-size:.83rem;display:flex;justify-content:space-between;gap:8px}
.cat-body{padding:9px;display:flex;flex-direction:column;gap:8px;max-height:75vh;overflow:auto}

/* ITEM CARD */
.item-card{background:rgba(255,255,255,.033);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:var(--tr)}
.item-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.05)}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.item-title{font-weight:700;font-size:.88rem;line-height:1.34;margin-top:6px}
.item-meta{margin-top:6px;color:var(--muted);font-size:.77rem;line-height:1.4}
.item-docs{margin-top:6px;font-size:.76rem;color:#93b4ff}
.item-actions{display:flex;gap:5px;align-items:center}
.icon-btn{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 7px;cursor:pointer;font-size:.8rem;transition:var(--tr)}
.icon-btn:hover{color:var(--text);border-color:var(--line2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:.71rem;font-weight:700;border-radius:999px;padding:4px 8px}
.done{background:rgba(34,197,94,.12);color:#6ee7a0}
.focus{background:rgba(168,85,247,.15);color:#d8b4fe}
.doing{background:rgba(245,158,11,.13);color:#fbbf24}
.pending{background:rgba(239,68,68,.12);color:#fca5a5}

/* KANBAN — 4 columns */
.kanban-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1100px){.kanban-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.kanban-grid{grid-template-columns:1fr}}
.kan-col{background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden;min-height:260px}
.kan-head{padding:11px 15px;display:flex;align-items:center;gap:9px;font-weight:700;font-size:.86rem;border-bottom:1px solid var(--line)}
.kan-body{padding:9px;display:flex;flex-direction:column;gap:8px;min-height:220px}
.kan-body.drag-over{outline:2px dashed rgba(255,255,255,.2);outline-offset:-7px;border-radius:11px}
.kan-head.done-h{background:rgba(34,197,94,.08);color:#6ee7a0}
.kan-head.focus-h{background:rgba(168,85,247,.1);color:#d8b4fe}
.kan-head.doing-h{background:rgba(245,158,11,.09);color:#fbbf24}
.kan-head.pending-h{background:rgba(239,68,68,.09);color:#fca5a5}
/* Focus column gets a glow border */
.kan-col.focus-col{border-color:rgba(168,85,247,.25);box-shadow:0 0 18px rgba(168,85,247,.08)}
.draggable{cursor:grab}.draggable.dragging{opacity:.4;transform:scale(.96)}

/* EMPTY STATE */
.empty-state{padding:32px 16px;text-align:center;color:var(--muted2);border:1px dashed rgba(255,255,255,.07);border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:2rem;opacity:.35}
.empty-state p{font-size:.82rem;line-height:1.5;max-width:200px}

/* TIMELINE */
.timeline-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:860px){.timeline-grid{grid-template-columns:1fr}}
.timeline-col{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.timeline-head{padding:13px 17px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.timeline-list{padding:13px;display:flex;flex-direction:column;gap:11px;min-height:240px}
.timeline-list.drag-over{outline:2px dashed rgba(255,255,255,.18);outline-offset:-10px}
.timeline-item{position:relative;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:13px;padding:13px 13px 13px 19px;cursor:grab;transition:var(--tr)}
.timeline-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:13px 0 0 13px;background:var(--gold)}
.timeline-item.raz::before{background:#4ecb8a}
.timeline-item:hover{border-color:var(--line2)}
.timeline-date{font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);font-weight:700}
.timeline-item.raz .timeline-date{color:#4ecb8a}
.timeline-title{font-weight:800;margin:.24rem 0;font-size:.93rem}
.timeline-sub{color:var(--muted);font-size:.82rem}
.timeline-phase{margin-top:5px;font-size:.71rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em}
.timeline-actions{display:flex;gap:7px;margin-top:9px}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,4,12,.72);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-backdrop.show{display:flex}
.modal{width:min(980px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#0f1624,#090d18);border:1px solid rgba(255,255,255,.09);border-radius:22px;box-shadow:var(--shadow)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.modal-title h3{margin:8px 0 0;font-size:1.6rem;font-weight:800;letter-spacing:-.02em}
.modal-body{padding:22px}
.modal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:860px){.modal-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.modal-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:10px 13px;outline:none;transition:var(--tr)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(197,165,114,.38)}
.field textarea{min-height:100px;resize:vertical}
.docs-wrap{margin-top:18px;border-top:1px solid var(--line);padding-top:18px}
.doc-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:9px;margin-bottom:9px}
@media(max-width:660px){.doc-row{grid-template-columns:1fr}}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.impact-box,.problem-box,.next-box{margin-top:11px;padding:13px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.025)}
.impact-box strong,.problem-box strong,.next-box strong{display:block;margin-bottom:5px;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.meta-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.meta-tag{display:inline-flex;align-items:center;gap:5px;font-size:.71rem;font-weight:700;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.stage-Documentado{background:rgba(99,102,241,.13);color:#c7cbff}
.stage-Em-implantacao{background:rgba(245,158,11,.13);color:#fbbf24}
.stage-Implantado{background:rgba(34,197,94,.12);color:#6ee7a0}
.stage-Validado{background:rgba(197,165,114,.15);color:#e8c98a}

/* BRAND LOGO SLOTS */
.brand-logo-slot{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;font-size:1.1rem;flex-shrink:0}
.brand-logo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.brand-logo-slot.large{width:54px;height:54px;border-radius:15px}
.brand-inline-logo{width:19px;height:19px;object-fit:cover;border-radius:6px;vertical-align:-4px;margin-right:6px;border:1px solid rgba(255,255,255,.12)}

/* EXEC SUMMARY */
.exec-summary{background:linear-gradient(160deg,rgba(197,165,114,.08),rgba(197,165,114,.025));border:1px solid rgba(197,165,114,.18);border-radius:18px;padding:18px;margin:16px 0 22px}
.exec-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:12px}
@media(max-width:1100px){.exec-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.exec-grid{grid-template-columns:1fr}}
.exec-card{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:13px;padding:14px}
.exec-card h3{margin:0 0 9px;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.exec-list{margin:0;padding-left:16px;color:var(--text)}
.exec-list li{margin:5px 0;font-size:.85rem}
.mini-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:13px}
@media(max-width:860px){.mini-kpis{grid-template-columns:repeat(3,1fr)}}
.mini-kpi{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center}
.mini-kpi .n{font-size:1.2rem;font-weight:800}
.mini-kpi .l{font-size:.7rem;color:var(--muted);margin-top:3px}

/* CATEGORY BADGE COLORS */
.cat-CMV-Rentabilidade{background:rgba(59,140,95,.10);color:#a7f3c4}
.cat-Expansao{background:rgba(195,123,168,.10);color:#f9c8eb}
.cat-Financas{background:rgba(197,179,107,.12);color:#f3e5ab}
.cat-Marketing{background:rgba(155,127,209,.12);color:#d8ccff}
.cat-Operacional{background:rgba(200,138,125,.12);color:#ffd7cf}
.cat-Processos{background:rgba(122,162,214,.12);color:#dbeaff}
.cat-Pessoas{background:rgba(212,107,107,.12);color:#ffd2d2}
.cat-Tecnologia{background:rgba(138,148,168,.14);color:#e2e8f0}
.phase-tag{background:rgba(255,255,255,.05)}

/* COMMAND PALETTE */
.cmd-backdrop{position:fixed;inset:0;background:rgba(0,4,12,.82);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:80px 18px 18px;backdrop-filter:blur(4px)}
.cmd-backdrop.show{display:flex}
.cmd-box{width:min(600px,100%);background:#0e1525;border:1px solid rgba(255,255,255,.12);border-radius:18px;box-shadow:0 28px 72px rgba(0,0,0,.7);overflow:hidden}
.cmd-input-wrap{display:flex;align-items:center;gap:11px;padding:15px 18px;border-bottom:1px solid var(--line)}
.cmd-input-icon{font-size:1rem;color:var(--muted)}
.cmd-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:.97rem}
.cmd-input::placeholder{color:var(--muted2)}
.cmd-results{max-height:360px;overflow:auto}
.cmd-section{padding:8px 12px 3px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.cmd-item{display:flex;align-items:center;gap:11px;padding:9px 15px;cursor:pointer;transition:var(--tr);font-size:.86rem}
.cmd-item:hover,.cmd-item.selected{background:rgba(255,255,255,.06)}
.cmd-item .ci-icon{font-size:.95rem;width:26px;text-align:center;flex-shrink:0}
.cmd-item .ci-text{flex:1;min-width:0}
.cmd-item .ci-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-item .ci-sub{font-size:.74rem;color:var(--muted);margin-top:1px}
.cmd-item .ci-badge{font-size:.68rem;padding:2px 7px;border-radius:999px;flex-shrink:0}
.cmd-empty{padding:30px;text-align:center;color:var(--muted2);font-size:.86rem}
.cmd-footer{padding:9px 15px;border-top:1px solid var(--line);display:flex;gap:14px;font-size:.7rem;color:var(--muted2)}
.cmd-footer span{display:flex;align-items:center;gap:4px}
.cmd-footer kbd{background:rgba(255,255,255,.08);border:1px solid var(--line2);border-radius:4px;padding:1px 5px;font-size:.68rem}

/* TOAST */
.toast-container{position:fixed;bottom:22px;right:22px;z-index:300;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{display:flex;align-items:center;gap:11px;background:#161e2e;border:1px solid rgba(255,255,255,.11);border-radius:11px;padding:11px 15px;font-size:.83rem;box-shadow:0 12px 32px rgba(0,0,0,.5);animation:toast-in .28s cubic-bezier(.4,0,.2,1);pointer-events:auto;max-width:320px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--blue)}.toast.warning{border-left:3px solid var(--amber)}
.toast-icon{font-size:.95rem;flex-shrink:0}.toast-msg{flex:1;line-height:1.4}
.toast.out{animation:toast-out .28s cubic-bezier(.4,0,.2,1) forwards}
@keyframes toast-in{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
@keyframes toast-out{from{opacity:1;transform:none}to{opacity:0;transform:translateX(18px)}}

.hidden{display:none!important}
.last-updated{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--muted2)}

@media print{
  .topbar,.nav,.toolbar,.filter,.subnav,.edit-only,.toast-container,.cmd-backdrop,.timeline-actions,.item-actions{display:none!important}
  body{background:#fff;color:#111}.wrap{padding:0}
  .stat,.exec-card,.progress-box,.mini-kpi,.chart-card,.kan-col,.timeline-col,.brand-card{background:#f9fafb!important;border-color:#ddd!important}
  .page{display:block!important}.hero h1{-webkit-text-fill-color:#111}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div id="topLogo" class="brand-badge">📊</div>
    <div id="topBrandName">LN CONSULTORIA</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" data-page="overview">Visão Geral</button>
    <button class="nav-btn" data-page="activities">Atividades</button>
    <button class="nav-btn" data-page="zanoni">🥩 Sr. Zanoni</button>
    <button class="nav-btn" data-page="raz">🌿 Raz</button>

    <button class="ic-btn edit-only" id="presentBtn" onclick="togglePresentation()" title="Modo Apresentação">🎭</button>
    <button class="ic-btn edit-only" onclick="window.print()" title="PDF / Imprimir">🖨️</button>

  </div>
</div>
<div class="wrap">
  <section id="page-overview" class="page active"></section>
  <section id="page-activities" class="page"></section>
  <section id="page-zanoni" class="page"></section>
  <section id="page-raz" class="page"></section>
  <section id="page-timeline" class="page"></section>
</div>
<div id="detailModal" class="modal-backdrop"><div class="modal" id="detailContent"></div></div>
<div id="editModal" class="modal-backdrop"><div class="modal" id="editContent"></div></div>
<div id="timelineModal" class="modal-backdrop"><div class="modal" id="timelineContent"></div></div>
<div id="brandModal" class="modal-backdrop"><div class="modal" id="brandContent"></div></div>
<div id="cmdPalette" class="cmd-backdrop" onclick="if(event.target===this)closeCmd()">
  <div class="cmd-box">
    <div class="cmd-input-wrap">
      <span class="cmd-input-icon">🔍</span>
      <input id="cmdInput" class="cmd-input" placeholder="Pesquisar entregas, navegar, ações…" autocomplete="off"/>
    </div>
    <div id="cmdResults" class="cmd-results"></div>
    <div class="cmd-footer">
      <span><kbd>↑↓</kbd> navegar</span><span><kbd>↵</kbd> abrir</span><span><kbd>Esc</kbd> fechar</span>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<input id="brandLogoInput" type="file" accept="image/*" class="hidden"/>
<input id="zanoniLogoInput" type="file" accept="image/*" class="hidden"/>
<input id="razLogoInput" type="file" accept="image/*" class="hidden"/>
<input id="importInput" type="file" accept="application/json" class="hidden"/>
<script>
/* ═══════════════════════════════════════════════════
   DEFAULT DATA  (status "Em foco" = working RIGHT NOW)
═══════════════════════════════════════════════════ */
const DEFAULT_DATA={items:[],timeline:[]};
const DATA_FILE='data.json';
let PUBLISHED_DATA=clone(DEFAULT_DATA);

/* ═══════════ CONSTANTS ═══════════ */
const STORAGE_KEY='mrz_dashboard_v3';
const SETTINGS_KEY='ln_brand_v2';
const TS_KEY=STORAGE_KEY+'_ts';
const ALL_STATUSES=['Concluído','Em foco','Em andamento','Pendente'];
const DEFAULT_SETTINGS={consultancyName:'LN CONSULTORIA',heroTitle:'LN CONSULTORIA',heroSubtitle:'Painel Estratégico · Grupo MRZ',mainLogo:'',zanoniLogo:'',razLogo:''};

/* ═══════════ STATE ═══════════ */
let brandSettings=loadSettings();
let state=enrichState(clone(DEFAULT_DATA));
let currentPillar={'Sr. Zanoni':'marketing','Raz':'marketing'};
let currentFilter={'z':'','r':''};
let dragItemId=null;
let dragTid=null;

/* ═══════════ UTILS ═══════════ */
function clone(o){return JSON.parse(JSON.stringify(o))}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,9)}
function statusClass(s){return s==='Concluído'?'done':s==='Em foco'?'focus':s==='Em andamento'?'doing':'pending'}
function progressFor(list){
  if(!list.length)return 0;
  const pts=list.reduce((a,i)=>a+(i.status==='Concluído'?1:(i.status==='Em foco'||i.status==='Em andamento'?.5:0)),0);
  return Math.round(pts/list.length*100);
}
function countByStatus(list,s){return list.filter(i=>i.status===s).length}
function byBrand(b){return state.items.filter(i=>i.brand===b)}
function byBrandPillar(b,p){return state.items.filter(i=>i.brand===b&&i.pillar===p)}
function pillars(){return['marketing','pessoas','financeiro','processos','expansao']}
function pillarLabel(p){return{marketing:'Marketing',pessoas:'Gestão de Pessoas',financeiro:'Financeiro & CMV',processos:'Processos & Operação',expansao:'Expansão'}[p]||p}
function pillarIcon(p){return{marketing:'📣',pessoas:'👥',financeiro:'💰',processos:'⚙️',expansao:'🚀'}[p]||'📌'}
function normCatClass(cat){return'cat-'+cat.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'')}
function sortItems(arr){
  const pr={Alta:0,Média:1,Baixa:2};
  const st={'Concluído':0,'Em foco':1,'Em andamento':2,'Pendente':3};
  return[...arr].sort((a,b)=>(st[a.status]-st[b.status])||(pr[a.priority]-pr[b.priority])||a.title.localeCompare(b.title,'pt-BR'));
}
function sortTimeline(arr){return[...arr].sort((a,b)=>(a.order??0)-(b.order??0)||a.date.localeCompare(b.date))}
function formatMonth(v){const[y,m]=String(v).split('-');const n=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return`${n[(+m)-1]||m}/${y}`}
function inferTimelinePhase(t){
  const txt=((t.title||'')+' '+(t.subtitle||'')).toLowerCase();
  if(txt.includes('contrato')||txt.includes('diagnóstico'))return'Diagnóstico e organização';
  if(txt.includes('manual')||txt.includes('cmv')||txt.includes('estoque'))return'Padronização e controle';
  if(txt.includes('execução')||txt.includes('em execução'))return'Implantação e validação';
  return'Escala e expansão';
}
function enrichItem(i){
  const pm={marketing:'Estruturação',pessoas:'Estruturação',financeiro:'Diagnóstico',processos:'Estruturação',expansao:'Escala'};
  return{...i,
    problem:i.problem||'Gargalo ou risco identificado na operação e/ou gestão que justificou a frente de trabalho.',
    businessImpact:i.businessImpact||'Fortalece controle, clareza de execução e base para crescimento com mais previsibilidade.',
    nextStep:i.nextStep||'Consolidar implantação prática, acompanhar aderência e validar resultado na rotina.',
    phase:i.phase||pm[i.pillar]||'Estruturação',
    progressStage:i.progressStage||(i.status==='Concluído'?'Implantado':i.status==='Em foco'||i.status==='Em andamento'?'Em implantação':'Documentado'),
    evidenceType:i.evidenceType||(i.docs&&i.docs.length?'Documento':'Implantação')
  };
}
function enrichState(s){return{...s,items:(s.items||[]).map(enrichItem),timeline:(s.timeline||[]).map(t=>({phase:t.phase||inferTimelinePhase(t),...t}))}}
async function loadPublishedData(){
  try{
    const res=await fetch(`${DATA_FILE}?v=${Date.now()}`,{cache:'no-store'});
    if(!res.ok)throw new Error('Não foi possível carregar data.json');
    const data=await res.json();
    if(!data.items)throw new Error('data.json inválido');
    PUBLISHED_DATA=enrichState(data);
    return clone(PUBLISHED_DATA);
  }catch(e){
    console.warn('Falha ao carregar data.json:',e);
    return enrichState(clone(DEFAULT_DATA));
  }
}
function loadState(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r)return enrichState(JSON.parse(r));
  }catch(e){}
  return enrichState(clone(PUBLISHED_DATA));
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function loadSettings(){try{const r=localStorage.getItem(SETTINGS_KEY);if(r)return{...clone(DEFAULT_SETTINGS),...JSON.parse(r)};}catch(e){}return clone(DEFAULT_SETTINGS)}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(brandSettings))}
function getLastUpdated(){try{const r=localStorage.getItem(TS_KEY);return r?new Date(+r):null;}catch(e){return null}}
function touchTs(){localStorage.setItem(TS_KEY,Date.now())}

/* ═══════════ BRAND / LOGO ═══════════ */
function brandIconOnly(brand){
  const src=brand==='Sr. Zanoni'?brandSettings.zanoniLogo:brandSettings.razLogo;
  if(src)return`<img src="${esc(src)}" class="brand-inline-logo" alt="${esc(brand)}">`;
  return brand==='Sr. Zanoni'?'🥩':'🌿';
}
function setLogoSlot(el,src,fallback='📊'){
  if(!el)return;
  el.innerHTML=src?`<img src="${esc(src)}" alt="logo">`:`<span style="font-size:1.1rem">${fallback}</span>`;
}
function applyBranding(){
  document.title=`${brandSettings.consultancyName} — Dashboard Premium`;
  const tb=document.getElementById('topBrandName');if(tb)tb.textContent=brandSettings.consultancyName||'LN CONSULTORIA';
  setLogoSlot(document.getElementById('topLogo'),brandSettings.mainLogo,'📊');
  const ht=document.getElementById('heroTitle');if(ht)ht.textContent=brandSettings.heroTitle||brandSettings.consultancyName||'LN CONSULTORIA';
  const hs=document.getElementById('heroSubtitle');if(hs)hs.textContent=brandSettings.heroSubtitle||'Painel Estratégico · Grupo MRZ';
  const navZ=document.querySelector('.nav button[data-page="zanoni"]');if(navZ)navZ.innerHTML=`${brandIconOnly('Sr. Zanoni')} Sr. Zanoni`;
  const navR=document.querySelector('.nav button[data-page="raz"]');if(navR)navR.innerHTML=`${brandIconOnly('Raz')} Raz`;
}

/* ═══════════ PAGE NAV ═══════════ */
function switchPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+p)?.classList.add('active');
  document.querySelector(`.nav button[data-page="${p}"]`)?.classList.add('active');
}
document.querySelectorAll('.nav button').forEach(b=>{if(b.dataset.page)b.addEventListener('click',()=>switchPage(b.dataset.page))});

/* ═══════════ PRESENTATION MODE ═══════════ */
function togglePresentation(){
  const on=document.body.classList.toggle('presentation-mode');
  const btn=document.getElementById('presentBtn');
  btn.classList.toggle('active',on);
  btn.title=on?'Sair do modo apresentação':'Modo Apresentação';
  btn.textContent=on?'✅':'🎭';
  toast(on?'Modo apresentação ativo — edição oculta':'Modo apresentação desativado','info');
}

/* ═══════════ TOAST ═══════════ */
function toast(msg,type='success',ms=3200){
  const c=document.getElementById('toastContainer');
  const icons={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'•'}</span><span class="toast-msg">${esc(msg)}</span>`;
  c.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),320)},ms);
}

/* ═══════════ COMMAND PALETTE ═══════════ */
let cmdIdx=-1;
function openCmd(){document.getElementById('cmdPalette').classList.add('show');const inp=document.getElementById('cmdInput');inp.value='';inp.focus();cmdIdx=-1;renderCmd('')}
function closeCmd(){document.getElementById('cmdPalette').classList.remove('show')}
function renderCmd(q){
  const res=document.getElementById('cmdResults');
  const query=q.trim().toLowerCase();
  let html='';
  if(!query){
    const pages=[['overview','🏠','Visão Geral'],['activities','📋','Atividades'],['zanoni','🥩','Sr. Zanoni'],['raz','🌿','Raz'],['timeline','📅','Linha do Tempo']];
    html+=`<div class="cmd-section">Navegar</div>`;
    html+=pages.map(([p,ic,lb])=>`<div class="cmd-item" data-act="page" data-val="${p}"><span class="ci-icon">${ic}</span><div class="ci-text"><div class="ci-title">${lb}</div></div></div>`).join('');
    html+=`<div class="cmd-section">Ações rápidas</div>`;
    html+=`<div class="cmd-item" data-act="new"><span class="ci-icon">➕</span><div class="ci-text"><div class="ci-title">Nova entrega</div><div class="ci-sub">Adicionar ao dashboard</div></div></div>`;
    html+=`<div class="cmd-item" data-act="present"><span class="ci-icon">🎭</span><div class="ci-text"><div class="ci-title">Modo apresentação</div><div class="ci-sub">Ocultar botões de edição</div></div></div>`;
    html+=`<div class="cmd-item" data-act="print"><span class="ci-icon">🖨️</span><div class="ci-text"><div class="ci-title">Imprimir / Exportar PDF</div></div></div>`;
    html+=`<div class="cmd-item" data-act="export"><span class="ci-icon">⬇️</span><div class="ci-text"><div class="ci-title">Exportar dados JSON</div></div></div>`;
  } else {
    const matches=state.items.filter(i=>
      i.title.toLowerCase().includes(query)||
      (i.summary||'').toLowerCase().includes(query)||
      (i.owner||'').toLowerCase().includes(query)||
      i.brand.toLowerCase().includes(query)||
      pillarLabel(i.pillar).toLowerCase().includes(query)
    ).slice(0,10);
    if(matches.length){
      html+=`<div class="cmd-section">Entregas (${matches.length})</div>`;
      html+=matches.map(i=>`<div class="cmd-item" data-act="detail" data-val="${i.id}">
        <span class="ci-icon">${pillarIcon(i.pillar)}</span>
        <div class="ci-text"><div class="ci-title">${esc(i.title)}</div><div class="ci-sub">${esc(i.brand)} · ${pillarLabel(i.pillar)}</div></div>
        <span class="badge ${statusClass(i.status)} ci-badge">${esc(i.status)}</span>
      </div>`).join('');
    } else {
      html=`<div class="cmd-empty">Nenhum resultado para "<strong>${esc(q)}</strong>"</div>`;
    }
  }
  res.innerHTML=html;
  res.querySelectorAll('.cmd-item').forEach(el=>el.addEventListener('click',()=>{runCmd(el);closeCmd()}));
}
function runCmd(el){
  const a=el.dataset.act,v=el.dataset.val;
  if(a==='page')switchPage(v);
  else if(a==='detail')openDetail(v);
  else if(a==='new')openEditModal(null);
  else if(a==='present')togglePresentation();
  else if(a==='print')window.print();
  else if(a==='export')exportJSON();
}
function moveCmdCursor(d){
  const items=document.querySelectorAll('.cmd-item');if(!items.length)return;
  items[cmdIdx]?.classList.remove('selected');
  cmdIdx=(cmdIdx+d+items.length)%items.length;
  items[cmdIdx]?.classList.add('selected');
  items[cmdIdx]?.scrollIntoView({block:'nearest'});
}
document.getElementById('cmdInput').addEventListener('input',e=>{cmdIdx=-1;renderCmd(e.target.value)});

/* ═══════════ KEYBOARD ═══════════ */
document.addEventListener('keydown',e=>{
  const cmdOpen=document.getElementById('cmdPalette').classList.contains('show');
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();cmdOpen?closeCmd():openCmd();return}
  if(cmdOpen){
    if(e.key==='Escape'){closeCmd();return}
    if(e.key==='ArrowDown'){e.preventDefault();moveCmdCursor(1);return}
    if(e.key==='ArrowUp'){e.preventDefault();moveCmdCursor(-1);return}
    if(e.key==='Enter'){const s=document.querySelector('.cmd-item.selected');if(s){runCmd(s);closeCmd()}return}
    return;
  }
  if(e.key==='Escape'){['detailModal','editModal','timelineModal','brandModal'].forEach(id=>document.getElementById(id)?.classList.remove('show'));return}
  if(e.key==='n'&&!e.metaKey&&!e.ctrlKey&&document.activeElement===document.body)openEditModal(null);
});

/* ═══════════ RENDER HELPERS ═══════════ */
function docLinks(docs){return(docs||[]).map(d=>`<a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.label||d.url)}</a>`).join(' · ')}
function progressRow(label,pct,color){
  return`<div class="progress-row"><div class="progress-label">${label}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div><div class="progress-pct">${pct}%</div></div>`;
}
function emptyState(msg='Nenhuma entrega aqui'){
  return`<div class="empty-state"><div class="empty-icon">✨</div><p>${esc(msg)}</p></div>`;
}

/* ═══════════ RENDER CARD ═══════════ */
function renderCard(item){
  const sc=statusClass(item.status);
  const catCls=normCatClass(item.category);
  const docsHtml=item.docs?.length?`<div class="item-docs">📎 ${item.docs.map(d=>`<a href="${esc(d.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(d.label||d.url)}</a>`).join(' · ')}</div>`:'';
  return`<div class="item-card draggable" draggable="true" data-id="${item.id}"
    ondragstart="onCardDragStart(event)" ondragend="onCardDragEnd(event)"
    onclick="openDetail('${item.id}')">
    <div class="item-top">
      <span class="badge ${sc}">${esc(item.status)}</span>
      <div class="item-actions edit-only">
        <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${item.id}')" title="Editar">✏️</button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteItem('${item.id}')" title="Excluir">🗑️</button>
      </div>
    </div>
    <div class="item-title">${esc(item.title)}</div>
    <div class="item-meta">${brandIconOnly(item.brand)} ${esc(item.brand)} · <span class="badge ${catCls}" style="font-size:.66rem;padding:2px 7px">${esc(item.category)}</span></div>
    ${docsHtml}
  </div>`;
}

/* ═══════════ KANBAN COLUMN (4 statuses) ═══════════ */
function renderKanbanCol(brand,pillar,status){
  const items=sortItems(byBrandPillar(brand,pillar).filter(i=>i.status===status));
  const sc=statusClass(status);
  const headCls=sc+'-h';
  const isFocus=status==='Em foco';
  const icons={'Concluído':'✅','Em foco':'🎯','Em andamento':'🔄','Pendente':'⏳'};
  const emptyMsgs={'Concluído':'Nenhum concluído ainda','Em foco':'Arraste aqui o que está fazendo agora','Em andamento':'Nenhum em andamento','Pendente':'Nada pendente'};
  return`<div class="kan-col${isFocus?' focus-col':''}">
    <div class="kan-head ${headCls}">${icons[status]} ${esc(status)} <span style="margin-left:auto;font-size:.75rem;opacity:.65">${items.length}</span></div>
    <div class="kan-body" data-brand="${esc(brand)}" data-pillar="${esc(pillar)}" data-status="${esc(status)}"
      ondragover="onBoardDragOver(event)" ondrop="onBoardDrop(event,this)">
      ${items.map(renderCard).join('')||emptyState(emptyMsgs[status]||'')}
    </div>
  </div>`;
}

/* ═══════════ EXEC SUMMARY ═══════════ */
function buildExecSummary(brand){
  const all=byBrand(brand);if(!all.length)return'';
  const done=all.filter(i=>i.status==='Concluído');
  const focus=all.filter(i=>i.status==='Em foco');
  const doing=all.filter(i=>i.status==='Em andamento');
  const pending=all.filter(i=>i.status==='Pendente');
  const pct=progressFor(all);
  const color=brand==='Sr. Zanoni'?'var(--zanoni)':'var(--raz)';
  return`<div class="exec-summary">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px">
      <div style="font-weight:800;font-size:1.05rem">${brandIconOnly(brand)} Resumo Executivo</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:1.7rem;font-weight:900;color:${color}">${pct}%</div>
        <div style="color:var(--muted);font-size:.8rem">progresso<br>geral</div>
      </div>
    </div>
    <div class="exec-grid">
      <div class="exec-card">
        <h3>✅ Concluídos (${done.length})</h3>

function renderCompany(brand){
  const pageId='page-'+(brand==='Sr. Zanoni'?'zanoni':'raz');

  const fKey=brand==='Sr. Zanoni'?'z':'r';

  const all=byBrand(brand);
  const pct=progressFor(all);
  const pil=currentPillar[brand]||'marketing';
  const filterVal=(currentFilter[fKey]||'').toLowerCase();

  let pillarItems=byBrandPillar(brand,pil);
  if(filterVal)pillarItems=pillarItems.filter(i=>i.title.toLowerCase().includes(filterVal)||(i.summary||'').toLowerCase().includes(filterVal));

  const subnavBtns=pillars().map(p=>{

function renderActivities(){
  const page=document.getElementById('page-activities');if(!page)return;
  const filterEl=document.getElementById('act_filter');

  const brandEl=document.getElementById('act_brand');

  const sv=statusEl?.value||'';
  const bv=brandEl?.value||'';
  let items=[...state.items];
  if(fv)items=items.filter(i=>i.title.toLowerCase().includes(fv)||(i.summary||'').toLowerCase().includes(fv));
  if(sv)items=items.filter(i=>i.status===sv);
  if(bv)items=items.filter(i=>i.brand===bv);
  items=sortItems(items);
  const cats=['CMV / Rentabilidade','Expansão','Finanças','Marketing','Operacional','Processos','Pessoas','Tecnologia'];
  let boardHtml='<div class="board-wrap">';
  cats.forEach(cat=>{
    const ci=items.filter(i=>i.category===cat);if(!ci.length)return;
    const cc=normCatClass(cat);
    boardHtml+=`<div class="cat-col"><div class="cat-head"><span class="badge ${cc}">${esc(cat)}</span><span style="color:var(--muted);font-size:.76rem">${ci.length}</span></div><div class="cat-body">${ci.map(renderCard).join('')}</div></div>`;

function drawDonut(canvasId,data,colors){
  const el=document.getElementById(canvasId);if(!el)return;
  const ex=Chart.getChart(canvasId);if(ex)ex.destroy();
  new Chart(el,{type:'doughnut',data:{datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:500,easing:'easeInOutQuart'},responsive:true,maintainAspectRatio:false}});
}

function saveItem(id){
  const g=s=>document.getElementById(s)?.value||'';
  const docs=[...document.querySelectorAll('#docsContainer .doc-row')].map(r=>({label:r.querySelector('.doc-label')?.value||'',url:r.querySelector('.doc-url')?.value||''})).filter(d=>d.url);
  const data={title:g('ef_title'),brand:g('ef_brand'),pillar:g('ef_pillar'),category:g('ef_category'),status:g('ef_status'),priority:g('ef_priority'),owner:g('ef_owner'),phase:g('ef_phase'),progressStage:g('ef_stage'),summary:g('ef_summary'),problem:g('ef_problem'),businessImpact:g('ef_impact'),nextStep:g('ef_next'),evidenceType:docs.length?'Documento':'Implantação',docs};
  if(!data.title.trim()){toast('O título é obrigatório','error');return}
  if(id){const idx=state.items.findIndex(i=>i.id===id);if(idx>-1)state.items[idx]={...state.items[idx],...data};toast('Entrega atualizada','success');}
  else{state.items.push({id:uid('i'),...data});toast('Entrega criada','success');}
  touchTs();saveState();closeModal('editModal');renderAll();
}

function deleteItem(id){
  if(!confirm('Remover esta entrega?'))return;
  state.items=state.items.filter(i=>i.id!==id);
  touchTs();saveState();renderAll();toast('Entrega removida','warning');
}

/* ═══════════ TIMELINE MODAL ═══════════ */
function openTimelineModal(id,preBrand){
  const t=id?state.timeline.find(x=>x.id===id):null;
  const v=n=>esc(t?.[n]||'');
  const bVal=t?.brand||preBrand||'Sr. Zanoni';
  document.getElementById('timelineContent').innerHTML=`
    <div class="modal-head">
      <div class="modal-title"><span class="badge doing">Marco</span><h3>${t?'Editar Marco':'Novo Marco'}</h3></div>
      <button class="icon-btn" onclick="closeModal('timelineModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="field"><label>Marca</label><select id="tf_brand">
          <option value="Sr. Zanoni" ${bVal==='Sr. Zanoni'?'selected':''}>🥩 Sr. Zanoni</option>
          <option value="Raz" ${bVal==='Raz'?'selected':''}>🌿 Raz</option>
        </select></div>
        <div class="field"><label>Mês (AAAA-MM)</label><input id="tf_date" value="${v('date')}" placeholder="2026-04"></div>
        <div class="field"><label>Título</label><input id="tf_title" value="${v('title')}" placeholder="Nome do marco"></div>
        <div class="field"><label>Subtítulo</label><input id="tf_sub" value="${v('subtitle')}" placeholder="Descrição breve"></div>
        <div class="field"><label>Fase</label><select id="tf_phase">
          ${['Diagnóstico e organização','Padronização e controle','Implantação e validação','Escala e expansão'].map(f=>`<option ${t?.phase===f?'selected':''}>${esc(f)}</option>`).join('')}
        </select></div>
      </div>
    </div>
    <div class="modal-foot">
      ${t?`<button class="danger-btn" onclick="deleteTimeline('${t.id}');closeModal('timelineModal')">🗑️ Excluir</button>`:'<div></div>'}
      <div style="display:flex;gap:9px">
        <button class="ghost-btn" onclick="closeModal('timelineModal')">Cancelar</button>
        <button class="primary-btn" onclick="saveTimeline('${id||''}')">💾 Salvar</button>
      </div>
    </div>`;
  document.getElementById('timelineModal').classList.add('show');
}

function saveTimeline(id){
  const g=s=>document.getElementById(s)?.value||'';
  const data={brand:g('tf_brand'),date:g('tf_date'),title:g('tf_title'),subtitle:g('tf_sub'),phase:g('tf_phase')};
  if(!data.title.trim()){toast('Título obrigatório','error');return}
  if(id){const idx=state.timeline.findIndex(t=>t.id===id);if(idx>-1)state.timeline[idx]={...state.timeline[idx],...data};toast('Marco atualizado','success');}
  else{const mo=Math.max(0,...state.timeline.filter(t=>t.brand===data.brand).map(t=>t.order||0));state.timeline.push({id:uid('t'),...data,order:mo+1});toast('Marco adicionado','success');}
  touchTs();saveState();closeModal('timelineModal');renderAll();
}

function deleteTimeline(id){
  if(!confirm('Remover este marco?'))return;
  state.timeline=state.timeline.filter(t=>t.id!==id);
  saveState();renderAll();toast('Marco removido','warning');
}

/* ═══════════ BRAND MODAL ═══════════ */
function openBrandModal(){
  document.getElementById('brandContent').innerHTML=`
    <div class="modal-head">
      <div class="modal-title"><span class="badge doing">Personalizar</span><h3>Marca e Logos</h3></div>
      <button class="icon-btn" onclick="closeModal('brandModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="field" style="grid-column:1/-1"><label>Nome da consultoria</label><input id="bs_name" value="${esc(brandSettings.consultancyName)}"></div>
        <div class="field" style="grid-column:1/-1"><label>Título principal</label><input id="bs_heroTitle" value="${esc(brandSettings.heroTitle)}"></div>
        <div class="field" style="grid-column:1/-1"><label>Subtítulo</label><input id="bs_heroSubtitle" value="${esc(brandSettings.heroSubtitle)}"></div>
        <div class="field">
          <label>Logo principal</label>
          <div id="mLP" class="brand-logo-slot large">${brandSettings.mainLogo?`<img src="${esc(brandSettings.mainLogo)}">`:'<span style="font-size:1.3rem">📊</span>'}</div>
          <div style="display:flex;gap:7px;margin-top:8px"><button class="ghost-btn" onclick="document.getElementById('brandLogoInput').click()">Enviar</button><button class="small-btn danger-btn" onclick="clearLogo('mainLogo','mLP','📊')">Remover</button></div>
        </div>
        <div class="field">
          <label>Logo Sr. Zanoni</label>
          <div id="zLP" class="brand-logo-slot large">${brandSettings.zanoniLogo?`<img src="${esc(brandSettings.zanoniLogo)}">`:'<span style="font-size:1.3rem">🥩</span>'}</div>
          <div style="display:flex;gap:7px;margin-top:8px"><button class="ghost-btn" onclick="document.getElementById('zanoniLogoInput').click()">Enviar</button><button class="small-btn danger-btn" onclick="clearLogo('zanoniLogo','zLP','🥩')">Remover</button></div>
        </div>
        <div class="field">
          <label>Logo Raz</label>
          <div id="rLP" class="brand-logo-slot large">${brandSettings.razLogo?`<img src="${esc(brandSettings.razLogo)}">`:'<span style="font-size:1.3rem">🌿</span>'}</div>
          <div style="display:flex;gap:7px;margin-top:8px"><button class="ghost-btn" onclick="document.getElementById('razLogoInput').click()">Enviar</button><button class="small-btn danger-btn" onclick="clearLogo('razLogo','rLP','🌿')">Remover</button></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger-btn" onclick="if(confirm('Resetar todos os dados para o padrão?'))resetDashboard()">🔄 Resetar dados</button>
      <button class="primary-btn" onclick="saveBrandSettings()">💾 Salvar</button>
    </div>`;
  document.getElementById('brandModal').classList.add('show');
  setupLogoInputs();
}

function saveBrandSettings(){
  brandSettings.consultancyName=document.getElementById('bs_name')?.value||'';
  brandSettings.heroTitle=document.getElementById('bs_heroTitle')?.value||'';
  brandSettings.heroSubtitle=document.getElementById('bs_heroSubtitle')?.value||'';
  saveSettings();closeModal('brandModal');renderAll();toast('Configurações salvas','success');
}

function clearLogo(key,previewId,fallback){
  brandSettings[key]='';
  const p=document.getElementById(previewId);
  if(p)p.innerHTML=`<span style="font-size:1.3rem">${fallback}</span>`;
  saveSettings();renderAll();
}

function setupLogoInputs(){
  [['brandLogoInput','mainLogo','mLP'],['zanoniLogoInput','zanoniLogo','zLP'],['razLogoInput','razLogo','rLP']].forEach(([inpId,key,prevId])=>{
    const inp=document.getElementById(inpId);if(!inp)return;
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{brandSettings[key]=ev.target.result;const p=document.getElementById(prevId);if(p)p.innerHTML=`<img src="${ev.target.result}">`;saveSettings();renderAll();};
      r.readAsDataURL(f);
    };
  });
}

/* ═══════════ DRAG & DROP KANBAN ═══════════ */
function onCardDragStart(e){dragItemId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging')}
function onCardDragEnd(e){e.currentTarget.classList.remove('dragging');dragItemId=null}
function onBoardDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function onBoardDrop(e,col){
  e.preventDefault();col.classList.remove('drag-over');
  if(!dragItemId)return;
  const newStatus=col.dataset.status;
  const item=state.items.find(i=>i.id===dragItemId);
  if(item&&item.status!==newStatus){
    item.status=newStatus;
    if(newStatus==='Concluído')item.progressStage='Implantado';
    else if(newStatus==='Em foco'||newStatus==='Em andamento')item.progressStage='Em implantação';
    touchTs();saveState();renderAll();
    toast(`Movido para "${newStatus}"`,newStatus==='Concluído'?'success':'info');
  }
  dragItemId=null;
}
document.addEventListener('dragover',e=>{
  document.querySelectorAll('.kan-body').forEach(b=>{if(!b.contains(e.target))b.classList.remove('drag-over')});
});

/* ═══════════ DRAG & DROP TIMELINE ═══════════ */
function onTlDragStart(e){dragTid=e.currentTarget.dataset.tid;e.currentTarget.classList.add('dragging')}
function onTlDragEnd(e){e.currentTarget.classList.remove('dragging');dragTid=null}
function onTlDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function onTlDrop(e,col){
  e.preventDefault();col.classList.remove('drag-over');
  if(!dragTid)return;
  const t=state.timeline.find(x=>x.id===dragTid);if(!t)return;
  const brand=col.dataset.brand;if(brand)t.brand=brand;
  const sibs=state.timeline.filter(x=>x.brand===t.brand);sibs.forEach((x,i)=>x.order=i+1);
  const cards=[...col.querySelectorAll('.timeline-item')];
  const afterEl=cards.find(c=>{const rc=c.getBoundingClientRect();return e.clientY<rc.top+rc.height/2;});
  if(afterEl){const af=state.timeline.find(x=>x.id===afterEl.dataset.tid);if(af)t.order=af.order-.5;}
  else t.order=sibs.length+1;
  state.timeline.filter(x=>x.brand===t.brand).sort((a,b)=>a.order-b.order).forEach((x,i)=>x.order=i+1);
  saveState();renderTimeline();dragTid=null;
}

/* ═══════════ EXPORT / IMPORT ═══════════ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='data.json';a.click();URL.revokeObjectURL(url);
  toast('Arquivo data.json baixado','success');
}
document.getElementById('importInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const im=JSON.parse(ev.target.result);
      if(!im.items)throw new Error('Formato inválido');
      state=enrichState(im);
      saveState();
      renderAll();
      toast('Dados importados. Agora clique em exportar para baixar o novo data.json.','success',5000);
    }catch(err){toast('Erro ao importar: '+err.message,'error');}
  };
  r.readAsText(f);e.target.value='';
});

async function loadPublishedVersion(showToast=false){
  [STORAGE_KEY,TS_KEY].forEach(k=>localStorage.removeItem(k));
  const fresh=await loadPublishedData();
  state=enrichState(clone(fresh));
  saveState();
  touchTs();
  renderAll();
  if(showToast)toast('Versão publicada carregada','info');
}

function resetDashboard(){
  [STORAGE_KEY,SETTINGS_KEY,TS_KEY].forEach(k=>localStorage.removeItem(k));
  brandSettings=clone(DEFAULT_SETTINGS);
  loadPublishedVersion(true);
}

/* ═══════════ CLOSE MODAL ═══════════ */
function closeModal(id){document.getElementById(id)?.classList.remove('show')}

/* ═══════════ INIT ═══════════ */
async function initDashboard(){
  PUBLISHED_DATA=await loadPublishedData();
  state=loadState();
  touchTs();
  renderAll();
}
initDashboard();

</script>
